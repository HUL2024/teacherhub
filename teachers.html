<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Browse qualified teacher profiles on Teacher-Hub."/>
  <title>Teacher Profiles — Teacher-Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .teachers-layout { display:grid; grid-template-columns:260px 1fr; gap:32px; padding:48px 0; }
    @media(max-width:800px){ .teachers-layout{ grid-template-columns:1fr; } }

    .sidebar-card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; box-shadow:var(--shadow); margin-bottom:20px; }
    .sidebar-card h3 { font-size:17px; margin-bottom:18px; }
    .filter-group { margin-bottom:18px; }
    .filter-group label { display:block; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin-bottom:8px; }

    .teachers-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:24px; }

    .t-card { display:flex; flex-direction:column; }
    .t-card-top { display:flex; align-items:flex-start; gap:16px; margin-bottom:16px; }
    .t-avatar-lg {
      width:60px; height:60px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-serif); font-size:22px; color:#fff;
    }
    .t-card-name h3 { font-size:17px; margin-bottom:3px; }
    .t-card-name p  { font-size:13px; color:var(--muted); }
    .t-card-bio     { font-size:13px; color:var(--muted); line-height:1.65; margin-bottom:14px; flex:1; }
    .t-subjects     { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
    .t-details-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
    .t-detail       { font-size:12px; }
    .t-detail span  { display:block; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); font-weight:700; margin-bottom:2px; }


    .premium-banner {
      background:linear-gradient(135deg, var(--amber), #e89420);
      color:#fff; border-radius:var(--radius-lg); padding:24px; margin-bottom:20px;
    }
    .premium-banner h3 { color:#fff; font-size:16px; margin-bottom:8px; }
    .premium-banner p  { font-size:13px; color:rgba(255,255,255,.8); line-height:1.6; margin-bottom:14px; }

    .empty-state { grid-column:1/-1; text-align:center; padding:64px 24px; color:var(--muted); }
  </style>
</head>
<body>
<div id="toast"></div>
<nav id="navbar"></nav>

<!-- ── Page Hero ── -->
<header class="page-hero page-hero--sage">
  <div class="container">
    <h1>Teacher Directory</h1>
    <p>Connect with qualified educators across Liberia</p>
  </div>
</header>

<!-- ── Main Layout ── -->
<div class="container">
  <div class="teachers-layout">

    <!-- Sidebar -->
    <aside>
      <div class="sidebar-card">
        <h3>Find Teachers</h3>

        <div class="filter-group">
          <label>Search</label>
          <div class="form-group" style="margin-bottom:0">
            <input type="text" id="searchInput" placeholder="Name, subject…" oninput="renderTeachers()"/>
          </div>
        </div>

        <div class="filter-group">
          <label>Subject</label>
          <div class="form-group" style="margin-bottom:0">
            <input type="text" id="subjFilter" placeholder="e.g. Mathematics, Biology…" oninput="renderTeachers()"/>
          </div>
        </div>

        <div class="filter-group">
          <label>Location</label>
          <div class="form-group" style="margin-bottom:0">
            <input type="text" id="locFilter" placeholder="e.g. Monrovia, Harbel…" oninput="renderTeachers()"/>
          </div>
        </div>

        <div class="filter-group">
          <label>Experience</label>
          <select id="expFilter" onchange="renderTeachers()">
            <option value="">Any Experience</option>
            <option value="0-5">0 – 5 years</option>
            <option value="6-10">6 – 10 years</option>
            <option value="11-99">10+ years</option>
          </select>
        </div>

        <button class="btn btn--ghost btn--sm btn--block" onclick="clearFilters()" style="margin-top:8px;border:1px solid var(--border)">Clear Filters</button>
      </div>

      <div class="premium-banner">
        <h3>⭐ Go Premium</h3>
        <p>Premium profiles appear at the top of the directory with a highlighted badge and increased visibility.</p>
        <button class="btn btn--white btn--sm btn--block" onclick="TH.toast('Premium upgrade coming soon! 🚀')">Upgrade Profile</button>
      </div>
    </aside>

    <!-- Teacher Grid -->
    <main>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
        <div>
          <h2 style="font-size:22px" class="section-title">All Teachers</h2>
          <p id="teacherCount" style="font-size:14px;color:var(--muted)"></p>
        </div>
        <select id="sortTeachers" onchange="renderTeachers()" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:var(--font-sans);font-size:14px;background:var(--paper)">
          <option value="premium">Featured First</option>
          <option value="exp-desc">Most Experienced</option>
          <option value="exp-asc">Entry Level First</option>
        </select>
      </div>
      <div class="teachers-grid" id="teacherGrid"></div>
    </main>

  </div>
</div>

<footer id="footer"></footer>
<div id="modalHost"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/auth.js"></script>
<script>
  let allTeachers = [];

  /* ── Parse experience string to a number for sorting ── */
  function expToNum(str) {
    if (!str) return 0;
    const m = str.match(/\d+/);
    return m ? parseInt(m[0]) : 0;
  }

  /* ── Filter + render ── */
  function renderTeachers() {
    const q    = document.getElementById('searchInput').value.toLowerCase();
    const subj = document.getElementById('subjFilter').value.toLowerCase();
    const loc  = document.getElementById('locFilter').value.toLowerCase();
    const exp  = document.getElementById('expFilter').value;
    const sort = document.getElementById('sortTeachers').value;

    let list = allTeachers.filter(t => {
      const name     = (t.full_name   || '').toLowerCase();
      const subjects = (t.subjects    || '').toLowerCase();
      const location = (t.location    || '').toLowerCase();
      const expYrs   = expToNum(t.experience);

      if (q    && !name.includes(q) && !subjects.includes(q)) return false;
      if (subj && !subjects.includes(subj))                   return false;
      if (loc  && !location.includes(loc))                    return false;
      if (exp) {
        const [lo, hi] = exp.split('-').map(Number);
        if (expYrs < lo || expYrs > hi) return false;
      }
      return true;
    });

    if (sort === 'premium')  list.sort((a,b) => (b.is_premium ? 1:0) - (a.is_premium ? 1:0));
    if (sort === 'exp-desc') list.sort((a,b) => expToNum(b.experience) - expToNum(a.experience));
    if (sort === 'exp-asc')  list.sort((a,b) => expToNum(a.experience) - expToNum(b.experience));

    const grid = document.getElementById('teacherGrid');
    document.getElementById('teacherCount').textContent = list.length + ' teacher' + (list.length !== 1 ? 's' : '') + ' found';

    if (list.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div style="font-size:48px">👩‍🏫</div><h3>No teachers found</h3><p>Try adjusting your filters</p></div>';
      return;
    }

    grid.innerHTML = list.map(t => {
      const name     = t.full_name    || 'Unknown Teacher';
      const location = t.location     || 'Liberia';
      const subjects = t.subjects     ? t.subjects.split(',').map(s => s.trim()).filter(Boolean) : [];
      const bio      = t.bio          || 'No bio provided yet.';
      const qual     = t.qualification || '—';
      const exp      = t.experience   || '—';
      const grades   = t.grades       || '';
      const premium  = t.is_premium;
      const color    = TH.avatarColor(name);
      const initials = TH.initials(name);

      return (
        '<article class="card ' + (premium ? 'card--premium' : '') + ' t-card">' +
          '<div class="t-card-top">' +
            (t.photo_url
              ? '<div class="t-avatar-lg" style="background:transparent;overflow:hidden"><img src="' + t.photo_url + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%" alt=""/></div>'
              : '<div class="t-avatar-lg" style="background:' + color + '">' + initials + '</div>') +
            '<div class="t-card-name">' +
              '<h3>' + name + '</h3>' +
              '<p>📍 ' + location + '</p>' +
              (premium ? '<span class="badge badge--premium" style="margin-top:4px">⭐ Premium</span>' : '') +
            '</div>' +
          '</div>' +
          (subjects.length ? '<div class="t-subjects">' + subjects.map(s => '<span class="tag">' + s + '</span>').join('') + '</div>' : '') +
          '<p class="t-card-bio">' + bio + '</p>' +
          '<div class="t-details-grid">' +
            '<div class="t-detail"><span>Experience</span>' + exp + '</div>' +
            '<div class="t-detail"><span>Qualification</span>' + qual + '</div>' +
            (grades ? '<div class="t-detail" style="grid-column:1/-1"><span>Grades</span>' + grades + '</div>' : '') +
          '</div>' +
          '<div style="padding-top:14px;border-top:1px solid var(--border);display:flex;gap:8px">' +
            '<a href="teacher-profile.html?id=' + t.id + '" class="btn btn--primary btn--sm" style="flex:1;text-align:center">View Profile</a>' +
            (t.cv_url ? '<a href="' + t.cv_url + '" target="_blank" class="btn btn--outline btn--sm">📄 CV</a>' : '') +
          '</div>' +
        '</article>'
      );
    }).join('');
  }

  function clearFilters() {
    ['searchInput','subjFilter','locFilter','expFilter'].forEach(id => {
      document.getElementById(id).value = '';
    });
    renderTeachers();
  }

  /* ── Load real teachers from Supabase ── */
  document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('teacherGrid').innerHTML =
      '<div class="empty-state"><p style="color:var(--muted)">Loading teachers…</p></div>';

    const { data, error } = await db
      .from('profiles')
      .select('id, full_name, location, created_at, teacher_profiles(qualification, experience, subjects, bio, grades, is_premium, cv_url, photo_url)')
      .eq('role', 'teacher')
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('teacherGrid').innerHTML =
        '<div class="empty-state"><p style="color:var(--muted)">Could not load teachers. Please try again later.</p></div>';
      return;
    }

    // Flatten teacher_profiles — show ALL teachers, even those without a full profile yet
    allTeachers = (data || []).map(t => {
      const tp = Array.isArray(t.teacher_profiles) ? t.teacher_profiles[0] : t.teacher_profiles;
      return { ...t, ...(tp || {}) };
    }).filter(t => t.full_name);

    renderTeachers();
  });
</script>
</body>
</html>
