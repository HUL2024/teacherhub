<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Teacher-Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body { background:var(--paper); display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
    .reset-box { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius-lg); padding:40px 36px; max-width:420px; width:100%; box-shadow:var(--shadow-lg); }
    .reset-box .logo { font-family:var(--font-serif); font-size:22px; color:var(--ink); margin-bottom:24px; display:block; text-align:center; }
    .reset-box .logo span { color:var(--sage); }
    .reset-box h2 { font-family:var(--font-serif); font-size:24px; margin-bottom:6px; text-align:center; }
    .reset-box p  { font-size:14px; color:var(--muted); text-align:center; margin-bottom:24px; }
    .strength-bar { height:4px; border-radius:2px; background:var(--border); margin-top:6px; overflow:hidden; }
    .strength-fill { height:100%; border-radius:2px; transition:width .3s, background .3s; width:0; }
    .success-state { text-align:center; padding:10px 0; }
    .success-state .icon { font-size:52px; margin-bottom:16px; }
  </style>
</head>
<body>
<div id="toast"></div>

<div class="reset-box" id="resetBox">
  <a href="index.html" class="logo">Teacher<span>Hub</span></a>
  <h2>Set New Password</h2>
  <p>Enter a new password for your account</p>

  <form onsubmit="handleNewPassword(event)" id="resetForm">
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="newPass" placeholder="Min. 8 characters" required minlength="8" oninput="checkStrength(this.value)"/>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPass" placeholder="Repeat your new password" required/>
    </div>
    <div id="resetErr" class="alert alert--error hidden" style="margin-bottom:12px">Passwords do not match.</div>
    <button type="submit" class="btn btn--primary btn--block" id="resetBtn">Update Password</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/layout.js"></script>
<script>
  function checkStrength(val) {
    const fill = document.getElementById('strengthFill');
    let score = 0;
    if (val.length >= 8)  score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const colors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71'];
    fill.style.width = (score * 25) + '%';
    fill.style.background = colors[score - 1] || 'var(--border)';
  }

  async function handleNewPassword(e) {
    e.preventDefault();
    const newPass     = document.getElementById('newPass').value;
    const confirmPass = document.getElementById('confirmPass').value;
    const errDiv      = document.getElementById('resetErr');
    const btn         = document.getElementById('resetBtn');

    errDiv.classList.add('hidden');

    if (newPass !== confirmPass) {
      errDiv.classList.remove('hidden');
      return;
    }

    btn.textContent = 'Updating…';
    btn.disabled = true;

    const { error } = await db.auth.updateUser({ password: newPass });

    if (error) {
      errDiv.textContent = error.message;
      errDiv.classList.remove('hidden');
      btn.textContent = 'Update Password';
      btn.disabled = false;
      return;
    }

    // Success
    document.getElementById('resetBox').innerHTML =
      '<a href="index.html" class="logo">Teacher<span>Hub</span></a>' +
      '<div class="success-state">' +
        '<div class="icon">✅</div>' +
        '<h2 style="font-family:var(--font-serif);margin-bottom:8px">Password Updated!</h2>' +
        '<p style="color:var(--muted);font-size:14px;margin-bottom:24px">Your password has been changed successfully. You can now sign in with your new password.</p>' +
        '<a href="index.html" class="btn btn--primary btn--block">Go to Homepage</a>' +
      '</div>';
  }
</script>
</body>
</html>
